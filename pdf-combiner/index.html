<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Combiner</title>
    <link rel="icon" type="image/x-icon" href="../icon/pdf-combiner.webp">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="../main.css">
  </head>

  <body data-app="PDF Combiner">

    <header></header>

    <main>

      <div class="main wrap">

        <div class='input'>
          <div class='input-files'>
            <label for='input-files'>
              <p>Add files</p>
              <span>Click or drop files here to add</span>
              <div>
                <svg fill='none' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'>
                  <path clip-rule='evenodd'
                    d='M11 17C11 17.5523 11.4477 18 12 18C12.5523 18 13 17.5523 13 17V13H17C17.5523 13 18 12.5523 18 12C18 11.4477 17.5523 11 17 11H13V7C13 6.44771 12.5523 6 12 6C11.4477 6 11 6.44771 11 7V11H7C6.44772 11 6 11.4477 6 12C6 12.5523 6.44772 13 7 13H11V17Z'
                    fill-rule='evenodd'></path>
                </svg>
              </div>
              <input accept='application/pdf' hidden='' id='input-files' multiple='' type='file' />
            </label>
          </div>
          <div class='input-settings item'>
            <p>File Name</p>
            <label for='file-name'>
              <input id='file-name' placeholder='combined' type='text' />
              <span>.pdf</span>
            </label>
            <button id='combine'>Combine and Download PDF</button>
          </div>
        </div>

        <div class='output item'>
          <h3>File Order</h3>
          <div id='file-list'>No file(s)</div>
        </div>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>

    <script src="./script.js"></script>

    <div id="notification"></div>

    <script src="../main.js"></script>

      <footer></footer>
  </body>

</html>
