<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scott-Knott</title>
    <link rel="icon" type="image/x-icon" href="../icon/scott-knott.webp">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="../main.css">
  </head>

  <body data-app="Scott-Knott">

    <header></header>

    <main>

      <div class="main wrap">

        <div class="item input">
          <textarea id="dataInput" placeholder="Masukkan data, pisahkan dengan spasi/tab, contoh:
P1   28.82
P2   23.98
P3   14.64
P4   19.92
P5   13.26"></textarea>
          <div class="set-alpha">
            <label for="alpha">Signifikansi α:</label>
            <select id="alpha">
              <option value="0.05">0.05</option>
              <option value="0.01">0.01</option>
            </select>
          </div>
          <button onclick="runScottKnott()">Proses Scott-Knott</button>
        </div>

        <div class="item output">
          <div class="hasil-section" id="hasil"></div>
        </div>

        <div class="item calculation">
          <div class="result-section" id="result"></div>
        </div>

      </div>

    </main>

    <script src="./script.js"></script>

    <div id="notification"></div>

    <script src="../main.js"></script>

      <footer></footer>
  </body>

</html>
