name: Sync Advanta-v3 to SPECTRA

on:
repository_dispatch:
types:
- sync-advanta

permissions:
contents: write

jobs:
sync:
runs-on: ubuntu-latest

steps:
  - name: Checkout repo
    uses: actions/checkout@v4

  - name: Clone repo Privo
    run: git clone --depth=1 https://github.com/OzikPutraJarwo/Privo.git privo

  - name: Copy folder
    run: |
      rm -rf SPECTRA
      mkdir -p SPECTRA
      cp -r privo/Advanta-v3/. SPECTRA/

  - name: Commit changes
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "github-actions@users.noreply.github.com"

      git add SPECTRA

      if git diff --cached --quiet; then
        echo "No changes"
      else
        git commit -m "Auto sync Advanta-v3"
        git push
      fi