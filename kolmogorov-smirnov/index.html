<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolmogorov-Smirnov Test</title>
    <link rel="icon" type="image/x-icon" href="../icon/kolmogorov-smirnov.webp">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="../main.css">
  </head>

  <body data-app="Kolmogorov-Smirnov Test">

    <header></header>

    <main>

      <div class="main wrap">

        <div class="input-section">
          <h2>Data Input</h2>
          <p>Enter sample data:</p>
          <textarea id="dataInput" placeholder="Example:
0,112
0,176
0,22
0,271
0,273"></textarea>
          <div id="errorMessage" class="error"></div>
          <button id="calculateBtn">Run Kolmogorov-Smirnov Test</button>
        </div>

        <div id="resultsSection" style="display: none;">
          <div class="scrollable-table">
            <table id="sampleTable">
              <thead>
                <tr>
                  <th>No</th>
                  <th>Sample</th>
                  <th>Frequency</th>
                  <th>Cumulative</th>
                  <th>Sn(x)</th>
                  <th>Z-Score</th>
                  <th>F(x)</th>
                  <th>Difference</th>
                </tr>
              </thead>
              <tbody id="sampleTableBody">
              </tbody>
            </table>
          </div>

          <table class="result-table">
            <tr>
              <td>N</td>
              <td id="nSample"></td>
            </tr>
            <tr>
              <td>Mean</td>
              <td id="mean"></td>
            </tr>
            <tr>
              <td>Standard Deviation</td>
              <td id="stdDev"></td>
            </tr>
            <tr>
              <td>Maximum Difference</td>
              <td id="dn"></td>
            </tr>
            <tr>
              <td>Kolmogorov-Smirnov Table</td>
              <td id="ksTable"></td>
            </tr>
          </table>

          <div id="conclusion" class="conclusion">
          </div>
        </div>

      </div>

    </main>

    <script src="./script.js"></script>

    <div id="notification"></div>

    <script src="../main.js"></script>

      <footer></footer>
  </body>

</html>
