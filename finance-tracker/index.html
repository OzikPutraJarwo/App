<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>
    <link rel="icon" type="image/x-icon" href="../icon/finance-tracker.webp">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="../main.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
  </head>

  <body data-app="Finance Tracker" data-login data-cloud>

    <header></header>

    <main>

      <div class="main wrap">

        <div class="announcement">
          <p>Login first to use the app!</p>
        </div>

        <!-- Main Actions -->
        <div class="main-actions">
          <button id="add-item-btn" class="button" style="display:none;">Add Item</button>
          <button id="save-data-btn" class="button" style="display:none;">Save to Drive</button>
          <button id="tag-editor-btn" class="button" style="display:none;">Tag Editor</button>
        </div>

        <div id="data-container"></div>

        <!-- Modal Item -->
        <div class="modal" id="item-modal">
          <div class="modal-content">
            <div id="modal-title">Add Item</div>
            <input type="hidden" id="edit-item-index">
            <input type="hidden" id="edit-item-path">
            <label>Date: <input type="date" id="item-date"></label>
            <label>Type:
              <select id="item-type">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
              </select>
            </label>
            <label>Title: <input type="text" id="item-title"></label>
            <label>Amount: <input type="number" id="item-amount"></label>
            <label>Tag:
              <select id="item-tag"></select>
              <button onclick="openTagModal()">New Tag</button>
            </label>
            <div class="modal-actions">
              <button class="button ok" id="save-item-btn">Save</button>
              <button class="button cancel" onclick="closeItemModal()">Cancel</button>
            </div>
          </div>
        </div>

        <!-- Modal Tag -->
        <div class="modal" id="tag-modal">
          <div class="modal-content">
            <div>Add New Tag</div>
            <label>Tag Name: <input type="text" id="tag-name"></label>
            <label>Tag Color: <input type="color" id="tag-color" value="#ff0000"></label>
            <div class="modal-actions">
              <button class="button ok" onclick="saveTag()">Save Tag</button>
              <button class="button cancel" onclick="closeTagModal()">Cancel</button>
            </div>
          </div>
        </div>

        <!-- Modal Tag Editor -->
        <div class="modal" id="tag-editor-modal">
          <div class="modal-content">
            <div>Tag Editor</div>
            <div id="tag-list"></div>
            <div class="modal-actions">
              <button class="button cancel" onclick="closeTagEditor()">Close</button>
            </div>
          </div>
        </div>

      </div>

    </main>


    <div id="notification"></div>

    <script src="../main.js"></script>
    <script src="./script.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>
    <script src="https://apis.google.com/js/api.js" async defer onload="gapiLoaded()"></script>

      <footer></footer>
  </body>

</html>
