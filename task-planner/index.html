<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Planner</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="../main.css">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="../icon/task-planner.png">
  <link rel="icon" type="image/x-icon" href="../icon/task-planner.png">
</head>

<body data-app="Task Planner" data-login data-cloud>

  <header></header>

  <main>
    <div class="main wrap">

      <!-- Login Prompt -->
      <div class="tp-announce">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#b0b8c1"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
        <p>Login first to use the app</p>
      </div>

      <!-- Toolbar -->
      <div class="tp-toolbar" style="display:none;">
        <div class="tp-nav">
          <button class="tp-nav-arrow" id="prev-btn" aria-label="Previous">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6" />
            </svg>
          </button>
          <span class="tp-nav-title" id="view-title">March 2026</span>
          <button class="tp-nav-arrow" id="next-btn" aria-label="Next">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6" />
            </svg>
          </button>
        </div>
        <div class="tp-actions">
          <div class="tp-switcher">
            <button class="tp-switch active" id="month-view-btn">Month</button>
            <button class="tp-switch" id="year-view-btn">Year</button>
          </div>
          <button class="tp-icon-btn" id="today-btn" title="Go to today">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
          </button>
          <button class="tp-icon-btn" id="download-pdf-btn" title="Download PDF">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Month View -->
      <div id="month-container" class="tp-month-view"></div>

      <!-- Year View -->
      <div id="year-container" class="tp-year-view" style="display:none;"></div>

    </div>
  </main>

  <!-- Floating Action Button -->
  <div id="tp-fab" style="display:none;">
    <button onclick="openTaskModal()" aria-label="Add task">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg>
    </button>
  </div>

  <!-- Task Modal -->
  <div class="tp-overlay" id="tp-task-overlay">
    <div class="tp-dialog">
      <div class="tp-dialog-head">
        <h3 id="tp-dialog-title">Add Task</h3>
        <button class="tp-dialog-x" onclick="closeTaskModal()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="tp-dialog-body">
        <input type="hidden" id="edit-task-id">
        <div class="tp-field">
          <label>Task Name</label>
          <input type="text" id="task-title" placeholder="What needs to be done?">
        </div>
        <div class="tp-field-row">
          <div class="tp-field">
            <label>Date</label>
            <input type="date" id="task-date">
          </div>
          <div class="tp-field">
            <label>Time</label>
            <input type="time" id="task-time">
          </div>
        </div>
        <div class="tp-field">
          <label>Location</label>
          <input type="text" id="task-location" placeholder="Optional">
        </div>
        <div class="tp-field">
          <label>Notes</label>
          <textarea id="task-notes" rows="3" placeholder="Optional notes..."></textarea>
        </div>
      </div>
      <div class="tp-dialog-foot">
        <button class="tp-btn-save" id="save-task-btn">Save Task</button>
        <button class="tp-btn-cancel" onclick="closeTaskModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="tp-overlay" id="tp-detail-overlay">
    <div class="tp-dialog">
      <div class="tp-dialog-head">
        <h3 id="tp-detail-title"></h3>
        <button class="tp-dialog-x" onclick="closeDetailModal()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="tp-dialog-body">
        <div class="tp-detail-grid">
          <div class="tp-detail-row">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
            <span id="tp-detail-date"></span>
          </div>
          <div class="tp-detail-row">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
            <span id="tp-detail-time"></span>
          </div>
          <div class="tp-detail-row">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
              <circle cx="12" cy="10" r="3" />
            </svg>
            <span id="tp-detail-location"></span>
          </div>
          <div class="tp-detail-row tp-detail-notes-row">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
            </svg>
            <span id="tp-detail-notes"></span>
          </div>
        </div>
      </div>
      <div class="tp-dialog-foot tp-detail-foot">
        <button class="tp-btn-save" id="tp-toggle-status">Complete ✓</button>
        <button class="tp-btn-icon" id="tp-edit-btn" title="Edit">
          <img src="../icon/edit.png" alt="Edit">
        </button>
        <button class="tp-btn-icon tp-btn-del" id="tp-delete-btn" title="Delete">
          <img src="../icon/trash.png" alt="Delete">
        </button>
      </div>
    </div>
  </div>

  <!-- PDF generation area -->
  <div id="tp-pdf-area"></div>

  <div id="notification"></div>

  <script src="../main.js"></script>
  <script src="./script.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js" defer></script>
  <script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>
  <script src="https://apis.google.com/js/api.js" async defer onload="gapiLoaded()"></script>

    <footer></footer>
  </body>

</html>
