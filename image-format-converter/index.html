<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Format Converter</title>
    <link rel="icon" type="image/x-icon" href="../icon/image-format-converter.webp">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="../main.css">
  </head>

  <body data-app="Image Format Converter">

    <header></header>

    <main>

      <div class="main wrap">

        <div class="input">
          <div class="input-files">
            <label for="input-files">
              <p>Add files</p>
              <span>Click or drop files here to add</span>
              <div>
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path fill-rule="evenodd" clip-rule="evenodd"
                    d="M11 17C11 17.5523 11.4477 18 12 18C12.5523 18 13 17.5523 13 17V13H17C17.5523 13 18 12.5523 18 12C18 11.4477 17.5523 11 17 11H13V7C13 6.44771 12.5523 6 12 6C11.4477 6 11 6.44771 11 7V11H7C6.44772 11 6 11.4477 6 12C6 12.5523 6.44772 13 7 13H11V17Z" />
                </svg>
              </div>
              <input type="file" id="input-files" multiple="" hidden="" accept=".png, .jpeg, .jpg, .webp" />
            </label>
          </div>
          <div class="input-settings">
            <select id="format-select">
              <option value="jpeg">JPG</option>
              <option value="png">PNG</option>
              <option value="webp">WEBP</option>
            </select>
            <button id="convert-button" class="btn">Convert</button>
          </div>
        </div>

        <div class="output">
          <div id="main-container"></div>
          <div id="summary-container" hidden="" class="item summaryContainer"></div>
          <button id="download-all-button" hidden="" class="btn">Download All</button>
        </div>

      </div>

    </main>

    <script src="./script.js"></script>

    <div id="notification"></div>

    <script src="../main.js"></script>

      <footer></footer>
  </body>

</html>
