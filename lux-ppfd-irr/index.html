<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lux, PPFD, & IRR Converter</title>
    <link rel="icon" type="image/x-icon" href="../icon/lux-ppfd.webp">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="../main.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
  </head>

  <body data-app="Lux, PPFD, &amp; IRR Converter">

    <header></header>

    <main>

      <div class="main wrap">

        <div class="item select">
          <label for="select-spectrum" class="title">Select Light Source</label>
          <select name="select-spectrum" id="select-spectrum">
            <option value="none" selected disabled>Select light source first</option>
          </select>
        </div>

        <div class="options none">

<div class="input">
  <div class="item unified-converter">
    <div class="title">Converter</div>
    <div class="content">
      <div class="input-group">
        <label for="lux-input">Illuminance (lux)</label>
        <input type="number" name="lux-input" id="lux-input" placeholder="Enter Illuminance value">
      </div>
      
      <div class="input-group">
        <label for="ppfd-input">PPFD (µmol·m⁻²·s⁻¹)</label>
        <input type="number" name="ppfd-input" id="ppfd-input" placeholder="Enter PPFD value">
      </div>
      
      <div class="input-group">
        <label for="wm2-input">Total Irradiance (W·m⁻²)</label>
        <input type="number" name="wm2-input" id="wm2-input" placeholder="Enter Total Irradiance value">
      </div>
    </div>
  </div>
</div>

          <div class="item graph"></div>

        </div>

        <div class="item none" id="data"></div>

      </div>

    </main>

    <script src="./script.js"></script>

    <div id="notification"></div>

    <script src="../main.js"></script>

      <footer></footer>
  </body>

</html>
