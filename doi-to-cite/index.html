<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOI to Cite</title>
    <link rel="icon" type="image/x-icon" href="../icon/doi.webp">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="../main.css">
  </head>

  <body data-app="DOI to Cite">

    <header></header>

    <main>

      <div class="main wrap">

        <div class="item input">
          <h3>Input DOI Link</h3>
          <form id="form">
            <textarea id="doi" placeholder="One link per row, e.g:

https://doi.org/10.12791/KSBEC.2020.29.2.120
http://dx.doi.org/10.9787/KJBS.2014.46.1.052" required="" rows="5"></textarea>
            <button class="btn" type="submit">Search</button>
          </form>
        </div>

        <div class="item output hide">
          <div class="options">
            <h3>Results</h3>
            <p>Click each cite for details</p>
          </div>
          <div id="list"></div>
        </div>

      </div>

    </main>

    <script src="./script.js"></script>

    <div id="notification"></div>

    <script src="../main.js"></script>

      <footer></footer>
  </body>

</html>
